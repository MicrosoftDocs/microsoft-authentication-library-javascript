  - name: PromptValue
    uid: '@azure/msal-node.PromptValue'
    package: '@azure/msal-node'
    summary: >-
      we considered making this "enum" in the request instead of string, however
      it looks like the allowed list of

      prompt values kept changing over past couple of years. There are some
      undocumented prompt values for some

      internal partners too, hence the choice of generic "string" type instead
      of the "enum"
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        PromptValue: { CONSENT: string, CREATE: string, LOGIN: string, NONE:
        string, NO_SESSION: string, SELECT_ACCOUNT: string }
      return:
        description: ''
        type: >-
          { CONSENT: string, CREATE: string, LOGIN: string, NONE: string,
          NO_SESSION: string, SELECT_ACCOUNT: string }
